<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Resto - HD QR Code Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    
    <style>
        :root {
            --accent: #D4AF37;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --border-color: #2a2a2a;
        }
        
        body { 
            background: var(--bg-dark); 
            color: #ffffff; 
            padding: 30px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        .config-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 25px; 
        }
        
        .qr-card { 
            background: #ffffff; 
            color: #000000; 
            padding: 20px; 
            border-radius: 16px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 260px; 
            margin: 10px auto;
            border: 2px solid var(--border-color);
        }
        
        .btn-gold { 
            background: var(--accent); 
            color: #000; 
            font-weight: 700; 
            border: none; 
            border-radius: 8px; 
            transition: all 0.2s ease;
        }
        
        .btn-gold:hover { 
            background: #ffffff; 
            transform: translateY(-1px); 
        }

        /* CSS display sizing (Physical canvas will be 4x larger for HD) */
        canvas { 
            max-width: 100%; 
            height: auto; 
            margin-top: 5px; 
        }

        @media print {
            body { background: white; color: black; padding: 0; }
            .no-print { display: none !important; }
            .print-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .qr-card { box-shadow: none; border: 2px solid #000; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row no-print mb-4">
            <div class="col-12 text-center">
                <h1 style="color: var(--accent); font-weight: 800; letter-spacing: 1px;">FORTUNE RESTO</h1>
                <p class="text-muted">High Definition QR Code Generator for Tables with Logo</p>
            </div>
        </div>

        <div class="row config-card no-print mb-5 shadow">
            <div class="col-md-5 mb-3">
                <label class="form-label fw-bold">Target Menu URL :</label>
                <input type="url" id="menuUrl" class="form-control bg-dark text-white border-secondary" 
                       value="https://www.fortuneresto.com">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Absolute URL of your LOGO :</label>
                <input type="url" id="logoUrl" class="form-control bg-dark text-white border-secondary" 
                       value="https://i.postimg.cc/gkKp7Cf4/7469A604-11E0-42C3-9731-BC34039CEEB0.png" 
                       placeholder="https://www.fortuneresto.com/images/logo.png">
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Number of tables :</label>
                <input type="number" id="tableCount" class="form-control bg-dark text-white border-secondary" value="10" min="1">
            </div>
            <div class="col-12 text-end mt-2">
                <button class="btn btn-gold px-4 py-2" onclick="generateQRGrid()">
                    <i class="fas fa-qrcode me-2"></i>Generate QR Codes
                </button>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 print-grid" id="qrContainer"></div>
        
        <div class="text-center mt-5 no-print">
            <button class="btn btn-outline-light px-5 py-2" onclick="window.print()">
                <i class="fas fa-print me-2"></i>Print for the Restaurant
            </button>
        </div>
    </div>

    <script>
        // Automatic launch on initial file load
        window.onload = generateQRGrid;

        function generateQRGrid() {
            const baseUrl = document.getElementById('menuUrl').value.trim();
            const logoSrc = document.getElementById('logoUrl').value.trim();
            const count = parseInt(document.getElementById('tableCount').value, 10) || 1;
            const container = document.getElementById('qrContainer');
            
            container.innerHTML = ''; 

            // Image object initialization with Cross-Origin management (avoids Canvas CORS blocking)
            const logoImg = new Image();
            logoImg.crossOrigin = "Anonymous";
            logoImg.src = logoSrc;

            logoImg.onload = function() {
                buildGrid(baseUrl, count, container, logoImg);
            };
            
            // Fallback if remote image is inaccessible or URL is broken
            logoImg.onerror = function() {
                console.warn("Logo image could not be loaded. Generating raw QR codes.");
                buildGrid(baseUrl, count, container, null);
            };
        }

        function buildGrid(baseUrl, count, container, logoImg) {
            for (let i = 1; i <= count; i++) {
                // Proper URL parameter management (?table=X or &table=X)
                const separator = baseUrl.includes('?') ? '&' : '?';
                const finalTableUrl = `${baseUrl}${separator}table=${i}`;

                const col = document.createElement('div');
                col.className = 'col d-flex justify-content-center';
                col.innerHTML = `
                    <div class="qr-card">
                        <div style="font-size: 0.75rem; font-weight: 800; letter-spacing: 1.5px; color: #111; text-transform: uppercase;">Fortune Resto</div>
                        <div style="font-size: 1.6rem; font-weight: 900; color: #000; margin-bottom: 5px;">TABLE ${i}</div>
                        <canvas id="canvas-table-${i}" style="width: 220px; height: 220px;"></canvas>
                        <div style="font-size: 0.75rem; font-weight: 600; color: #444; margin-top: 8px;">
                            <i class="fas fa-mobile-alt me-1"></i> Scan to order
                        </div>
                    </div>
                `;
                container.appendChild(col);

                // Matrix instantiation ('H' correction essential at 30% to cover the central logo)
                const qr = qrcode(0, 'H');
                qr.addData(finalTableUrl);
                qr.make();

                const canvas = document.getElementById(`canvas-table-${i}`);
                const ctx = canvas.getContext('2d');
                
                // DENSITY MULTIPLIER (SUPERSAMPLING)
                const scaleFactor = 4; 
                const moduleSize = 6 * scaleFactor; 
                const margin = 2 * scaleFactor;
                const size = qr.getModuleCount() * moduleSize + margin * 2;
                
                // Resizing the physical Canvas matrix to very high resolution
                canvas.width = size;
                canvas.height = size;

                // Force high-quality anti-aliasing during downscaling
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                // Base white background
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, size, size);

                // Drawing QR data blocks
                ctx.fillStyle = '#000000';
                for (let row = 0; row < qr.getModuleCount(); row++) {
                    for (let colIdx = 0; colIdx < qr.getModuleCount(); colIdx++) {
                        if (qr.isDark(row, colIdx)) {
                            ctx.fillRect(
                                margin + colIdx * moduleSize,
                                margin + row * moduleSize,
                                moduleSize,
                                moduleSize
                            );
                        }
                    }
                }

                // Geometric embedding of the logo in the center
                if (logoImg) {
                    const logoSize = size * 0.22; // Safe ratio of 22% of the overall surface
                    const center = (size - logoSize) / 2;

                    // Creating the white background mask to separate the logo from the black QR pixels
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(
                        center - (3 * scaleFactor), 
                        center - (3 * scaleFactor), 
                        logoSize + (6 * scaleFactor), 
                        logoSize + (6 * scaleFactor)
                    );

                    // Surgical drawing of the logo image
                    ctx.drawImage(logoImg, center, center, logoSize, logoSize);
                }
            }
        }
    </script>
</body>
</html>
